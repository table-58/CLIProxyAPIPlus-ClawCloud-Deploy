# CLIProxyAPIPlus ClawCloud 推荐配置
# 复制此文件到 ClawCloud Run 的 Configmaps 中

api-keys:
  - "你的API密钥"  # 改成你自己的密钥

server:
  host: "0.0.0.0"
  port: 8317

debug: false

# Token 持久化路径（必须和 Volume 挂载路径一致）
auth-dir: "/root/.cli-proxy-api"

# 远程管理面板
remote-management:
  allow-remote: true
  secret-key: "你的管理密钥"  # 建议改成复杂的密钥
  disable-control-panel: false

# Plus 版第三方提供商（按需开启）
providers:
  openrouter:
    enabled: true
    api-key: ""
  groq:
    enabled: true
    api-key: ""
  deepseek:
    enabled: true
    api-key: ""
  siliconflow:
    enabled: false

# 日志配置
logging-to-file: false
usage-statistics-enabled: false

# 重试配置
request-retry: 3
